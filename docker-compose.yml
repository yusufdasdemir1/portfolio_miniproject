services:

  mysql:
    image: mysql:8.0
    container_name: portfolio_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: portfolio_db
      MYSQL_USER: portfolio_user
      MYSQL_PASSWORD: portfolio_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/portfolio.sql:/docker-entrypoint-initdb.d/01_portfolio.sql
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  php:
    build: .
    container_name: portfolio_php
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: portfolio_db
      DB_USER: root
      DB_PASS: rootpass
    networks:
      - portfolio_net
    depends_on:
      mysql:
        condition: service_healthy

networks:
  portfolio_net:
    driver: bridge

volumes:
  mysql_data:
